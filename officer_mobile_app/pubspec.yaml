name: officer_mobile_app
description: "RoadSOS Officer App"
publish_to: 'none'

version: 3.5.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0
  dio: ^5.4.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  flutter_map: any
  flutter_map_tile_caching: any
  latlong2: any
  geolocator: ^11.0.0
  audioplayers: ^6.0.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  connectivity_plus: ^6.0.3
  local_auth: ^2.1.8
  image_picker: ^1.1.2
  permission_handler: ^11.3.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/lottie/
